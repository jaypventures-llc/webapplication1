# Render Blueprint for JPV-OS
# See https://render.com/docs/blueprint-spec for documentation
# NOTE: This uses the free tier for evaluation. For production, change plan to 'starter' or higher.

services:
  - type: web
    name: jpv-os
    env: docker
    dockerfilePath: ./src/JPVOS/Dockerfile
    dockerContext: ./src/JPVOS
    region: oregon
    # Change to 'starter' or higher for production (free tier has cold starts)
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: PORT
        value: "8080"
