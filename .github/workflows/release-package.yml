name: Release Package

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish-web:
    name: Publish ASP.NET Core Web App
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore WebApplication1/WebApplication1.csproj

      - name: Build
        run: dotnet build WebApplication1/WebApplication1.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish WebApplication1/WebApplication1.csproj -c Release -o publish --no-build

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: webapplication1-release
          path: publish
