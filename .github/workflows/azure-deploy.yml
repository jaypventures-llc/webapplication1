name: Deploy to Azure App Service

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy ASP.NET Core Web App
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore WebApplication1/WebApplication1.csproj

      - name: Build
        run: dotnet build WebApplication1/WebApplication1.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish WebApplication1/WebApplication1.csproj -c Release -o publish --no-build

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish
