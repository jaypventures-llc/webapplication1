name: "CodeQL C#"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp' ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
    - name: Detect Default CodeQL Conflict
      if: failure()
      run: |
        if grep -Fq 'CodeQL analyses from advanced configurations cannot be processed when the default setup is enabled' "$GITHUB_STEP_SUMMARY" 2>/dev/null; then
          echo "::error::Default Code Scanning setup detected. Please disable the default setup in repository security settings."
          exit 1
        fi
