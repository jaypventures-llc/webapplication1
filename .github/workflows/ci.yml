name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore JPVOS.sln

      - name: Build
        run: dotnet build JPVOS.sln -c Release --no-restore

      - name: Test
        run: dotnet test JPVOS.sln -c Release --no-build --verbosity normal
