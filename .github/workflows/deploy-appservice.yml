name: deploy-appservice

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ./src/JPVOS/JPVOS.csproj

      - name: Build
        run: dotnet build ./src/JPVOS/JPVOS.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./src/JPVOS/JPVOS.csproj -c Release -o ./publish

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: jpv-os-access-gateway
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish

      - name: Post-deploy health and homepage check
        run: |
          set -e
          echo "Checking /api/health..."
          resp=$(curl -sSf https://jpv-os-access-gateway.azurewebsites.net/api/health)
          echo "$resp" | jq -e '.status == "healthy"' > /dev/null
          echo "Health endpoint OK."

          echo "Checking homepage for stylesheet..."
          homepage=$(curl -sSf https://jpv-os-access-gateway.azurewebsites.net/)
          echo "$homepage" | grep 'init-home.css'
          echo "Homepage stylesheet present."

          echo "Checking homepage for hero text..."
          echo "$homepage" | grep 'Welcome to the Venture'
          echo "Homepage hero text present."

          echo "Checking homepage for CTA..."
          echo "$homepage" | grep 'Enter the Ecosystem'
          echo "Homepage CTA present."
        shell: bash
